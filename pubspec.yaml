name: windfoil_flutter
description: Windfoil vector text renderer ported to Flutter GPU.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.13.0-252.0.dev

dependencies:
  characters: ^1.4.0
  flutter:
    sdk: flutter
  flutter_gpu:
    sdk: flutter
  flutter_gpu_shaders: ^0.5.1
  hooks: ^2.0.2
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Lato-Regular.ttf
    - assets/TwemojiMozilla.ttf
    - assets/Google_Sans_Flex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf
    - assets/bench/en-gatsby-opening.txt
    - assets/bench/zh-zhufu.txt
    - assets/bench/mixed-app-text.txt
    - build/shaderbundles/
  fonts:
    - family: Lato
      fonts:
        - asset: assets/Lato-Regular.ttf
