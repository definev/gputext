name: gputext_workspace
publish_to: 'none'

environment:
  sdk: ^3.13.0-252.0.dev

workspace:
  - packages/**
  - example

dev_dependencies:
  melos: ^8.2.0

melos:
  repository: https://github.com/definev/gputext

  scripts:
    bootstrap:
      run: melos bootstrap
      description: Link local packages and install dependencies.

    analyze:
      run: melos exec -- dart analyze --fatal-infos
      description: Run static analysis in all packages.

    test:
      run: melos exec --fail-fast -- flutter test
      description: Run tests in all packages.

    format:
      run: melos exec -- dart format .
      description: Format Dart sources in all packages.

    format:check:
      run: melos exec -- dart format --set-exit-if-changed .
      description: Verify Dart formatting without writing changes.

    build:
      run: melos exec --scope="gputext" -- bash tool/build_shaders.sh
      description: Build gputext shader bundles via the package hook.

    clean:
      run: melos exec -- flutter clean
      description: Clean build artifacts in all packages.
