name: gputext
description: >-
  GPU-accelerated vector text for Flutter. Analytic coverage shaders via
  Flutter GPU, with HarfBuzz shaping for complex scripts and bidirectional text.
version: 0.1.0-dev.1
homepage: https://github.com/definev/gputext
repository: https://github.com/definev/gputext
issue_tracker: https://github.com/definev/gputext/issues
resolution: workspace

environment:
  sdk: ^3.13.0-252.0.dev
  flutter: '>=3.46.0-0'

topics:
  - flutter
  - text
  - gpu
  - rendering
  - fonts

dependencies:
  characters: ^1.4.0
  code_assets: ^1.2.1
  ffi: ^2.1.4
  flutter:
    sdk: flutter
  flutter_gpu:
    sdk: flutter
  flutter_gpu_shaders: ^0.5.1
  hooks: ^2.0.2
  logging: ^1.3.0
  native_toolchain_c: ^0.19.1
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Lato-Regular.ttf
    - assets/TwemojiMozilla.ttf
  fonts:
    - family: Lato
      fonts:
        - asset: assets/Lato-Regular.ttf
