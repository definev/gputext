name: gputext
description: GPUText vector text renderer ported to Flutter GPU.
publish_to: 'none'
version: 0.1.0+1
resolution: workspace

environment:
  sdk: ^3.13.0-252.0.dev

dependencies:
  characters: ^1.4.0
  flutter:
    sdk: flutter
  flutter_gpu:
    sdk: flutter
  flutter_gpu_shaders: ^0.5.1
  hooks: ^2.0.2
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Lato-Regular.ttf
    - assets/TwemojiMozilla.ttf
    - build/shaderbundles/
  fonts:
    - family: Lato
      fonts:
        - asset: assets/Lato-Regular.ttf
